<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lunelle — Ceramide promo (print)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@400;500;600;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #fff; font-family: 'Manrope', system-ui, sans-serif; }
    .page {
      width: 1080px; height: 1080px;
      margin: 24px auto;
      box-shadow: 0 6px 30px -10px rgba(0,0,0,0.18);
      overflow: hidden; position: relative;
      background: #fff;
    }
    @page { size: 1080px 1080px; margin: 0; }
    @media print {
      html, body { background: #fff; }
      .page {
        margin: 0; box-shadow: none;
        break-after: page; page-break-after: always;
      }
      .page:last-child { break-after: auto; page-break-after: auto; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>window.__SKIP_AUTO_MOUNT = true;</script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel">
    // Render two static print pages using the DirectionA/DirectionB components
    // exposed by app.jsx (which skips its own mount thanks to __SKIP_AUTO_MOUNT).
    const TWEAKS = {
      headline: "Quiet skin,\nloud glow.",
      eyebrow: "NEW — Ceramide Edit",
      cta: "Shop the drop",
      palette: "brand",
      showGrain: true,
      stripeDensity: 7,
      wordmarkSize: 1.0
    };

    function PrintApp() {
      const P = window.PALETTES.brand;
      const DirectionA = window.DirectionA;
      const DirectionB = window.DirectionB;
      return (
        <>
          <div className="page">
            <DirectionA t={TWEAKS} P={P} />
          </div>
          <div className="page">
            <DirectionB t={TWEAKS} P={P} />
          </div>
        </>
      );
    }

    // mount only after fonts are ready + a small delay
    (async function mount() {
      if (document.fonts && document.fonts.ready) {
        try { await document.fonts.ready; } catch (e) {}
      }
      await new Promise(r => setTimeout(r, 500));
      ReactDOM.createRoot(document.getElementById('root')).render(<PrintApp />);
      await new Promise(r => setTimeout(r, 600));
      window.print();
    })();
  </script>
</body>
</html>
